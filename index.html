<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EUR/USD – Yesterday OHLC</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: white;
        color: black;
        padding: 40px;
        font-size: 28px;
        line-height: 1.6;
    }
</style>
</head>
<body>

<h2>EUR/USD – Yesterday’s OHLC</h2>

<div id="data">Loading...</div>

<script>
async function loadOHLC() {
    try {
        // Get yesterday's date in YYYY-MM-DD
        const d = new Date();
        d.setDate(d.getDate() - 1);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const dateStr = `${y}-${m}-${day}`;

        // Fetch OHLC from exchangerate.host
        const url = `https://api.exchangerate.host/ohlc?base=EUR&symbols=USD&start_date=${dateStr}&end_date=${dateStr}`;
        const res = await fetch(url);
        const json = await res.json();

        const ohlc = json.rates[dateStr].USD;

        document.getElementById("data").innerHTML = `
            Open: ${ohlc.open}<br>
            High: ${ohlc.high}<br>
            Low: ${ohlc.low}<br>
            Close: ${ohlc.close}
        `;
    } catch (err) {
        document.getElementById("data").innerHTML = "Error loading data.";
    }
}

loadOHLC();
</script>

</body>
</html>
