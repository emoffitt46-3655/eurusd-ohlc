<script>
async function loadOHLC() {
    try {
        const url = "https://stellar-cupcake-626d3b.netlify.app/.netlify/functions/eurusd";
        const res = await fetch(url);
        const json = await res.json();

        document.getElementById("data").innerHTML = `
            Open: ${json.open}<br>
            High: ${json.high}<br>
            Low: ${json.low}<br>
            Close: ${json.close}
        `;
    } catch (err) {
        document.getElementById("data").innerHTML = "Error loading data.";
    }
}

loadOHLC();
</script>
