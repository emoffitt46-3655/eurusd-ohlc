<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EUR/USD – Yesterday OHLC</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: white;
        color: black;
        padding: 40px;
        font-size: 28px;
        line-height: 1.6;
    }
</style>
</head>
<body>

<h2>EUR/USD – Yesterday’s OHLC</h2>

<div id="data">Loading...</div>

<script>
async function loadOHLC() {
    try {
        // Get yesterday's date in YYYY-MM-DD
        const d = new Date();
        d.setDate(d.getDate() - 1);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const dateStr = `${y}-${m}-${day}`;

        // FCS API endpoint for EUR/USD daily data
        const url = `https://fcsapi.com/api-v3/forex/history?symbol=EUR/USD&period=1d`;

        const res = await fetch(url);
        const json = await res.json();

        // Extract OHLC from the most recent completed day
        const ohlc = json.response[0];

        // Format to 5 decimals
        const open = Number(ohlc.o).toFixed(5);
        const high = Number(ohlc.h).toFixed(5);
        const low = Number(ohlc.l).toFixed(5);
        const close = Number(ohlc.c).toFixed(5);

        document.getElementById("data").innerHTML = `
            Open: ${open}<br>
            High: ${high}<br>
            Low: ${low}<br>
            Close: ${close}
        `;
    } catch (err) {
        document.getElementById("data").innerHTML = "Error loading data.";
    }
}

loadOHLC();
</script>

</body>
</html>
