<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>EUR/USD OHLC</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background: #f5f5f5;
            text-align: center;
        }
        #data {
            font-size: 28px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

<h2>EUR/USD OHLC</h2>

<div id="data">Loading...</div>

<script>
async function loadOHLC() {
    try {
        const url = "https://stellar-cupcake-626d3b.netlify.app/.netlify/functions/eurusd";
        const res = await fetch(url);
        const json = await res.json();

        document.getElementById("data").innerHTML = `
            <strong>Open:</strong> ${json.open}<br>
            <strong>High:</strong> ${json.high}<br>
            <strong>Low:</strong> ${json.low}<br>
            <strong>Close:</strong> ${json.close}
        `;
    } catch (err) {
        document.getElementById("data").innerHTML = "Error loading data.";
    }
}

loadOHLC();
</script>

</body>
</html>
